<!DOCTYPE html>

<html lang="ko"> <!-- 한국어문서만 검색할때, 음성으로 할때 한국어 음성지원 -->
    <head>
        <meta charset="UTF-8"> <!-- 브라우저가 문서를 해석할때 필요한 정보 -->
        <title>스타일시트</title>
        <!-- 스타일시트자리 -->

        <style>
            .box-red{
                width: 300px;
                height: 150px;
                border-width: 4px;
                border-style: solid;
                border-color: #ff0000;
            }

            .box-blue {
                width: 300px;
                height: 150px;
                border: 5px solid #0000ff;
            }

            .box-4type {
                width: 300px;
                height: 150px;
                background-color: #ffff00;
                border-top: 4px solid #ff0000;
                border-right: 5px double #00ff00;
                border-bottom: 3px dashed #0000ff;
                border-left: 6px dotted #ff00ff;
            }
        </style>
    </head>

    <body>

        <div>
            <p class="box-red">
                *위치별 선지정
                가로 300px, 세로 150px
                배경색 #ffff00
                선두께 모두 4px
                선모양 그림참고
            </p>
        </div>


        <div>
            <p class="box-blue">
                *위치별 선지정
                가로 300px, 세로 150px
                배경색 #ffff00
                선두께 모두 4px
                선모양 그림참고
            </p>
        </div>


        <div>
            <p class="box-4type">
                *위치별 선지정
                가로 300px, 세로 150px
                배경색 #ffff00
                선두께 모두 4px
                선모양 그림참고
            </p>
        </div>
        

    </body>

</html>
