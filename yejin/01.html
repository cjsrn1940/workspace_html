<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>layoutsample01</title>

        <link rel="stylesheet" href="./css/01.css">
    </head>

    <body>
        <div id="wrap">
            <!-- 헤더 -->
            <div id="header">
                <h1>HEADER</h1>
            </div>
            <!-- //헤더 -->

            <!-- 네비 -->
            <div id="nav">
                <h2>NAV</h2>
            </div>
            <!-- //네비 -->

            <div>
                <!-- 섹션 -->
                <div id="sec" class="clearfix">
                    <p>section</p>
                    <div id="hd">
                        heading
                    </div>
                    <div id="article">
                        <article>
                            <h3>article</h3>
                            <p>why</p>
                        </article>
                    </div>
                </div>
                <!-- 섹션 -->

                <!-- 사이드 -->
                <div id="aside">
                    aside
                </div>
                <!-- //사이드  -->
            </div>

            <!-- 푸터 -->
            <div id="footer">
                footer
            </div>
            <!-- //푸터 -->
        </div>
    </body>
</html>
